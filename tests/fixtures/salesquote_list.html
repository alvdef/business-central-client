<!doctype html>
<html>
  <head>
    <meta name="description" content="Retrieve a list of sales quote objects for Business Central." />
  </head>
  <body>
    <main>
      <h1>List salesQuotes</h1>

      <h2>HTTP request</h2>
      <pre><code>GET businesscentralPrefix/companies({companyId})/salesQuotes</code></pre>

      <h2>Example</h2>
      <pre><code>GET https://api.businesscentral.dynamics.com/v2.0/production/api/v2.0/companies({companyId})/salesQuotes</code></pre>
    </main>
  </body>
</html>
