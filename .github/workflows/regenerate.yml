name: Regenerate SDK

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Regenerate SDK from Microsoft Learn
        run: bc-client regenerate

      - name: Run tests
        run: pytest

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/regenerate-business-central-sdk
          commit-message: "Regenerate Business Central SDK"
          title: "Regenerate Business Central SDK"
          body: |
            Automated regeneration from Microsoft Learn Business Central API v2.0 docs.

            This PR contains generated changes only when the normalized IR or SDK output changed.
          labels: generated, business-central
